name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: azure/setup-helm@v4
      - run: scripts/validate-chart.sh
      - uses: helm/kind-action@v1
        with:
          cluster_name: opencord-chart
      - run: |
          helm install opencord charts/opencord \
            --namespace opencord \
            --create-namespace \
            -f charts/opencord/examples/single-node-values.yaml
          helm status opencord --namespace opencord
