name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  helm:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: azure/setup-helm@v4
      - run: scripts/validate-chart.sh
      - uses: helm/kind-action@v1
        with:
          cluster_name: opencord-chart
      - run: |
          helm install opencord charts/opencord \
            --namespace opencord \
            --create-namespace \
            -f charts/opencord/examples/single-node-values.yaml
          helm status opencord --namespace opencord

  security:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Scan dependencies with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: v0.71.2
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          hide-progress: true
      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: v0.71.2
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: opencord-charts-sbom.cdx.json
          list-all-pkgs: true
          hide-progress: true
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: opencord-charts-sbom
          path: opencord-charts-sbom.cdx.json
          if-no-files-found: error
