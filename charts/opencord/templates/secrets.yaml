{{- if and (not .Values.database.external.enabled) .Values.database.bundled.enabled }}
{{- $databasePassword := randAlphaNum 32 -}}
{{- $existingDatabaseSecret := lookup "v1" "Secret" .Release.Namespace (include "opencord.databaseSecretName" .) -}}
{{- if and $existingDatabaseSecret (hasKey $existingDatabaseSecret "data") (hasKey $existingDatabaseSecret.data "POSTGRES_PASSWORD") -}}
{{- $databasePassword = (index $existingDatabaseSecret.data "POSTGRES_PASSWORD" | b64dec) -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "opencord.databaseSecretName" . }}
  labels:
    {{- include "opencord.componentLabels" (dict "root" . "component" "timescaledb") | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ $databasePassword | quote }}
  DATABASE_URL: {{ printf "postgres://%s:%s@%s:%d/%s?sslmode=disable" .Values.database.bundled.auth.username $databasePassword (include "opencord.componentName" (dict "root" . "component" "timescaledb")) (int .Values.database.bundled.servicePort) .Values.database.bundled.auth.database | quote }}
{{- end }}
{{- if and (not .Values.redis.external.enabled) .Values.redis.bundled.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "opencord.redisSecretName" . }}
  labels:
    {{- include "opencord.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
type: Opaque
stringData:
  REDIS_URL: {{ printf "redis://%s:%d" (include "opencord.componentName" (dict "root" . "component" "redis")) (int .Values.redis.bundled.servicePort) | quote }}
{{- end }}
