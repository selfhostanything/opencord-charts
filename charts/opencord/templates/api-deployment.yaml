apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opencord.componentName" (dict "root" . "component" "api") }}
  labels:
    {{- include "opencord.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "opencord.componentSelectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "opencord.componentSelectorLabels" (dict "root" . "component" "api") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "opencord.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: {{ include "opencord.image" (dict "root" . "repository" .Values.api.image.repository) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.api.containerPort }}
          {{- include "opencord.configEnvFrom" . | nindent 10 }}
          env:
            {{- include "opencord.databaseEnv" . | nindent 12 }}
            {{- include "opencord.valkeyEnv" . | nindent 12 }}
            {{- include "opencord.objectStorageEnv" . | nindent 12 }}
            {{- include "opencord.appSecretEnv" . | nindent 12 }}
            {{- include "opencord.livekitEnv" . | nindent 12 }}
            {{- include "opencord.turnEnv" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
