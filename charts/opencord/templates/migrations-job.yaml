{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "opencord.fullname" . }}-migrations
  labels:
    {{- include "opencord.labels" . | nindent 4 }}
spec:
  template:
    metadata:
      labels:
        {{- include "opencord.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrations
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "opencord.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrations
          image: {{ include "opencord.image" (dict "root" . "repository" .Values.migrations.image.repository) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          args:
            - migrate
          env:
            {{- include "opencord.databaseEnv" . | nindent 12 }}
{{- end }}
