opencord:
  publicUrl: "https://chat.example.com"
  environment: "vultr-production"

image:
  registry: "ghcr.io/selfhostanything"
  tag: "0.0.0-dev"
  pullPolicy: IfNotPresent

api:
  replicaCount: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 12
    targetCPUUtilizationPercentage: 70
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

realtime:
  replicaCount: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 12
    targetCPUUtilizationPercentage: 70
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

worker:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 75
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

database:
  external:
    enabled: true
    urlSecretName: "opencord-vultr-timescaledb"
  bundled:
    enabled: false

redis:
  external:
    enabled: true
    urlSecretName: "opencord-vultr-redis"
  bundled:
    enabled: false

objectStorage:
  provider: "s3"
  bucket: "opencord-production"
  endpoint: "https://ewr1.vultrobjects.com"
  existingSecret: "opencord-vultr-object-storage"

livekit:
  enabled: true
  externalUrl: "https://livekit.chat.example.com"
  existingSecret: "opencord-vultr-livekit"

turn:
  enabled: true
  mode: "external"
  urls:
    - "turn:turn.chat.example.com:3478?transport=udp"
    - "turn:turn.chat.example.com:3478?transport=tcp"
    - "turns:turn.chat.example.com:5349?transport=tcp"
  existingSecret: "opencord-vultr-turn"
  realm: "chat.example.com"
  relayPortRange:
    min: 50000
    max: 60000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: "chat.example.com"
      paths:
        - path: /
          pathType: Prefix
          service: api
        - path: /gateway
          pathType: Prefix
          service: realtime
  tls:
    - secretName: "opencord-chat-tls"
      hosts:
        - "chat.example.com"

customDomains:
  enabled: true
  hosts:
    - "customer.example.com"
  tlsSecretName: "opencord-custom-domains-tls"
