opencord:
  publicUrl: "https://chat.example.com"
  environment: "single-node"

api:
  replicaCount: 1

realtime:
  replicaCount: 1

worker:
  replicaCount: 1

database:
  external:
    enabled: false
    urlSecretName: "opencord-database"
  bundled:
    enabled: true
    persistence:
      enabled: true
      size: 20Gi
      storageClassName: ""

valkey:
  external:
    enabled: false
    urlSecretName: "opencord-valkey"
  bundled:
    enabled: true
    persistence:
      enabled: true
      size: 5Gi
      storageClassName: ""

kafka:
  bootstrapServers:
    - "kafka.opencord.svc.cluster.local:9092"

scylla:
  contactPoints:
    - "scylladb.opencord.svc.cluster.local:9042"
  keyspace: "opencord"

objectStorage:
  provider: "s3"
  bucket: "opencord"
  endpoint: ""
  existingSecret: ""

appSecrets:
  existingSecret: ""

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: "chat.example.com"
      paths:
        - path: /
          pathType: Prefix
          service: api
        - path: /gateway
          pathType: Prefix
          service: realtime
  tls:
    - secretName: "opencord-chat-tls"
      hosts:
        - "chat.example.com"
